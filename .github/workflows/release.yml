name: Release

# HACS бере версію інтеграції з GitHub-релізів. Теги — CalVer YYYY.M.N
# (як у Home Assistant Core): рік.місяць.номер-релізу-в-місяці, напр. 2026.7.0.
# Пуш тега, що збігається з version у manifest.json, створює реліз автоматично.

on:
  push:
    tags:
      - "20[0-9][0-9].*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Перевірити, що тег збігається з manifest version
        run: |
          man=$(python -c "import json;print(json.load(open('custom_components/oddinvest/manifest.json'))['version'])")
          if [ "$GITHUB_REF_NAME" != "$man" ]; then
            echo "::error::тег $GITHUB_REF_NAME != manifest version $man"
            exit 1
          fi
      - name: Створити реліз
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
